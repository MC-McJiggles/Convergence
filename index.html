ENCE</h3><div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '16px', fontSize: '11px' }}><div><p style={{ color: colors['red'], fontWeight: '700', marginBottom: '6px' }}>25+ MAXIMUM</p><p style={{ color: colors['muted'], fontSize: '10px' }}>80%+ accuracy | Enter large position</p></div><div><p style={{ color: colors['yellow'], fontWeight: '700', marginBottom: '6px' }}>15-24 HIGH</p><p style={{ color: colors['muted'], fontSize: '10px' }}>60-75% accuracy | Enter medium position</p></div><div><p style={{ color: colors['green'], fontWeight: '700', marginBottom: '6px' }}>10-14 MEDIUM</p><p style={{ color: colors['muted'], fontSize: '10px' }}>50-60% accuracy | Watch closely</p></div><div><p style={{ color: colors['muted'], fontWeight: '700', marginBottom: '6px' }}>&lt;10 WEAK</p><p style={{ color: colors['muted'], fontSize: '10px' }}>20-40% accuracy | Do NOT enter</p></div></div></div><div style={{ background: `linear-gradient(135deg, rgba(255, 71, 87, 0.08) 0%, rgba(255, 209, 102, 0.08) 100%)`, border: `1px solid rgba(255, 71, 87, 0.2)`, borderRadius: '20px', padding: '22px' }}><h3 style={{ color: colors['red'], marginBottom: '16px', fontSize: '12px', fontWeight: '700', letterSpacing: '0.15em', textTransform: 'uppercase' }}>🔴 SIGNAL LEVELS</h3><div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '16px', fontSize: '11px' }}><div style={{ lineHeight: '1.8' }}><p style={{ color: colors['accent'], fontWeight: '700', marginBottom: '8px' }}>EXTREME (30+)</p><p style={{ color: colors['text-primary'] }}>Perfect signal convergence. All factors aligned. Act immediately.</p></div><div style={{ lineHeight: '1.8' }}><p style={{ color: colors['green'], fontWeight: '700', marginBottom: '8px' }}>WEAK (&lt;10)</p><p style={{ color: colors['text-primary'] }}>Insufficient catalysts. Extended timeline. Do not enter.</p></div></div></div></div><div style={{ textAlign: 'center', padding: '32px 20px 16px 20px', borderTop: `1px solid ${colors['border
